<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>법적규제 테스트</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07090f;color:#dde4f2;font-family:'Noto Sans KR',sans-serif;min-height:100vh;}

/* 헤더 */
.hdr{background:#0d1117;border-bottom:1px solid #1e2a3e;padding:12px 16px;position:sticky;top:0;z-index:50;}
.hdr-title{font-size:11px;color:#f59e0b;letter-spacing:2px;margin-bottom:2px;}
.hdr-sub{font-size:15px;font-weight:800;}

/* 검색창 */
.search-wrap{padding:12px 16px;background:#0d1117;border-bottom:1px solid #1e2a3e;position:sticky;top:56px;z-index:49;}
.search-row{display:flex;gap:8px;}
.search-input{flex:1;background:#131925;border:1.5px solid #1e2a3e;border-radius:8px;padding:10px 12px;color:#dde4f2;font-size:14px;font-family:inherit;outline:none;}
.search-input:focus{border-color:#f59e0b;}
.search-btn{padding:10px 16px;background:#f59e0b;border:none;border-radius:8px;color:#000;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;}
.search-btn:disabled{opacity:.4;}

/* 자동완성 */
.suggest-box{background:#0d1117;border:1px solid #1e2a3e;border-radius:10px;margin-top:6px;overflow:hidden;display:none;box-shadow:0 8px 24px rgba(0,0,0,.6);}
.suggest-item{padding:11px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid #131925;display:flex;align-items:center;gap:8px;}
.suggest-item:last-child{border:none;}
.suggest-item:active{background:#131925;}
.suggest-addr{flex:1;}
.suggest-pnu{font-size:10px;color:#5a7090;font-family:monospace;}

/* 메인 */
main{padding:14px 16px 40px;}

/* 상태 카드 */
.state-card{border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid;}
.state-wait{background:rgba(90,112,144,.08);border-color:#1e2a3e;}
.state-loading{background:rgba(6,182,212,.06);border-color:rgba(6,182,212,.2);}
.state-ok{background:rgba(16,185,129,.06);border-color:rgba(16,185,129,.2);}
.state-err{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.2);}
.state-icon{font-size:28px;margin-bottom:8px;}
.state-title{font-size:14px;font-weight:800;margin-bottom:4px;}
.state-sub{font-size:11px;color:#5a7090;line-height:1.7;}

/* PNU 배지 */
.pnu-badge{background:#131925;border:1px solid #1e2a3e;border-radius:8px;padding:10px 14px;margin-bottom:12px;display:none;}
.pnu-label{font-size:9px;color:#5a7090;font-weight:700;letter-spacing:.5px;margin-bottom:4px;}
.pnu-val{font-size:13px;font-family:monospace;font-weight:700;color:#06c8d8;word-break:break-all;}
.pnu-addr{font-size:11px;color:#5a7090;margin-top:2px;}

/* 단계 표시 */
.steps{display:flex;gap:4px;margin-bottom:12px;}
.step{flex:1;height:3px;border-radius:2px;background:#1e2a3e;transition:background .3s;}
.step.done{background:#10b981;}
.step.active{background:#f59e0b;}
.step.fail{background:#ef4444;}

/* 로그 패널 */
.log-panel{background:#030508;border:1px solid #1e2a3e;border-radius:10px;padding:10px 12px;font-family:monospace;font-size:10px;line-height:1.9;max-height:200px;overflow-y:auto;margin-bottom:12px;display:none;}
.lg-ok{color:#10b981;}
.lg-err{color:#ef4444;}
.lg-warn{color:#f59e0b;}
.lg-info{color:#06c8d8;}
.lg-dim{color:#3a4a60;}

/* 규제 결과 */
.reg-addr-box{background:#0d1117;border:1px solid #1e2a3e;border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.reg-addr-title{font-size:14px;font-weight:800;margin-bottom:3px;}
.reg-addr-pnu{font-size:10px;color:#5a7090;font-family:monospace;}

.gauge-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.gauge-box{background:#0d1117;border:1px solid #1e2a3e;border-radius:10px;padding:11px;text-align:center;}
.gauge-label{font-size:9px;color:#5a7090;margin-bottom:4px;}
.gauge-val{font-size:20px;font-weight:800;margin-bottom:5px;}
.gauge-bar{height:3px;background:#1e2a3e;border-radius:2px;overflow:hidden;}
.gauge-fill{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.16,1,.3,1);}

.badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;}
.badge-warn{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.25);}
.badge-ok{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.2);}
.badge-info{background:rgba(42,111,255,.12);color:#6090ff;border:1px solid rgba(42,111,255,.2);}

.sec-card{border-left:3px solid;border-radius:0 10px 10px 0;padding:11px 13px;margin-bottom:8px;}
.sec-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.sec-name{font-size:11px;font-weight:800;}
.sec-law{font-size:8px;color:#5a7090;background:rgba(255,255,255,.05);padding:2px 5px;border-radius:3px;}
.sec-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:11px;}
.sec-row:last-child{border:none;}
.sec-label{color:#5a7090;}
.sec-val{font-weight:700;}
.sec-note{margin-top:7px;padding:7px 9px;background:rgba(240,165,0,.06);border-left:2px solid #f59e0b;border-radius:0 5px 5px 0;font-size:10px;color:#5a7090;line-height:1.7;}

.luris-btn{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#0891b2,#0e7490);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:800;cursor:pointer;margin-top:4px;}

/* 스피너 */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:32px;height:32px;border:3px solid #1e2a3e;border-top-color:#f59e0b;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">DUJON HOUSING · 디버그</div>
  <div class="hdr-sub">⚖️ 법적규제 독립 테스트</div>
</div>

<div class="search-wrap">
  <div class="search-row">
    <input class="search-input" id="addr-inp" type="text"
      placeholder="주소 입력 (예: 의정부시 녹양동 225-2)"
      oninput="onAddrInput()" onkeydown="if(event.key==='Enter')doSearch()">
    <button class="search-btn" id="search-btn" onclick="doSearch()">검색</button>
  </div>
  <div class="suggest-box" id="suggest-box"></div>
</div>

<main>
  <!-- 단계 표시 -->
  <div class="steps">
    <div class="step" id="step1" title="주소검색"></div>
    <div class="step" id="step2" title="PNU조회"></div>
    <div class="step" id="step3" title="API1"></div>
    <div class="step" id="step4" title="API2"></div>
    <div class="step" id="step5" title="렌더"></div>
  </div>

  <!-- 초기 안내 -->
  <div class="state-card state-wait" id="state-wait">
    <div class="state-icon">🔍</div>
    <div class="state-title">주소를 검색하세요</div>
    <div class="state-sub">
      위 검색창에 주소를 입력하면<br>
      자동으로 PNU를 조회하고<br>
      법적 규제 정보를 불러옵니다
    </div>
  </div>

  <!-- 로딩 -->
  <div class="state-card state-loading" id="state-loading" style="display:none;text-align:center;padding:24px;">
    <div class="spinner"></div>
    <div class="state-title" id="loading-msg">조회 중...</div>
  </div>

  <!-- 오류 -->
  <div class="state-card state-err" id="state-err" style="display:none;">
    <div class="state-title" id="err-title" style="color:#ef4444;">오류</div>
    <div class="state-sub" id="err-sub"></div>
  </div>

  <!-- PNU 배지 -->
  <div class="pnu-badge" id="pnu-badge">
    <div class="pnu-label">PNU (필지 고유번호)</div>
    <div class="pnu-val" id="pnu-val"></div>
    <div class="pnu-addr" id="pnu-addr"></div>
  </div>

  <!-- 로그 패널 -->
  <div class="log-panel" id="log-panel"></div>

  <!-- 규제 결과 -->
  <div id="reg-result" style="display:none;"></div>
</main>

<script>
const SK_KEY = 'A512471A-C75B-3644-BCCA-B3DC1D95254D';
const SK_BASE = 'https://api.vworld.kr';
const SK_DOMAIN = location.hostname || 'wisestar823.github.io';

let _pnu = '', _addr = '';
let _searchTimer = null;

/* ── 로그 ── */
function lg(msg, cls=''){
  const el = document.getElementById('log-panel');
  el.style.display = 'block';
  const t = new Date().toLocaleTimeString('ko-KR');
  el.innerHTML += `<span class="lg-${cls||'dim'}">[${t}] ${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

/* ── 단계 업데이트 ── */
function setStep(n, state){ // state: active|done|fail
  for(let i=1;i<=5;i++){
    const el = document.getElementById('step'+i);
    el.className = 'step' + (i<n?' done':i===n?' '+state:'');
  }
}

/* ── 화면 전환 ── */
function showState(s, msg=''){
  ['state-wait','state-loading','state-err'].forEach(id=>{
    document.getElementById(id).style.display = id==='state-'+s ? 'block':'none';
  });
  if(s==='loading' && msg) document.getElementById('loading-msg').textContent = msg;
  if(s!=='err') { document.getElementById('state-err').style.display='none'; }
}
function showErr(title, sub){
  document.getElementById('state-wait').style.display='none';
  document.getElementById('state-loading').style.display='none';
  document.getElementById('state-err').style.display='block';
  document.getElementById('err-title').textContent = title;
  document.getElementById('err-sub').innerHTML = sub;
  document.getElementById('reg-result').style.display='none';
}

/* ── JSONP ── */
function jsonp(url, cb, timeout=8000){
  const fn = '_jcb_'+Date.now()+'_'+Math.random().toString(36).slice(2,5);
  const fullUrl = url + '&domain='+SK_DOMAIN+'&callback='+fn;
  lg('요청: '+fullUrl.replace(SK_KEY,'***').slice(0,90)+'...', 'dim');
  window[fn] = (d)=>{ try{delete window[fn];}catch(e){} cb(null,d); };
  const s = document.createElement('script');
  s.onerror = ()=>{ try{delete window[fn];}catch(e){} cb('스크립트 로드 실패',null); };
  s.src = fullUrl;
  document.head.appendChild(s);
  setTimeout(()=>{ if(window[fn]){ delete window[fn]; cb('타임아웃('+timeout/1000+'초)',null); }}, timeout);
}

/* ── 주소 자동완성 ── */
function onAddrInput(){
  clearTimeout(_searchTimer);
  const q = document.getElementById('addr-inp').value.trim();
  const box = document.getElementById('suggest-box');
  if(q.length < 2){ box.style.display='none'; return; }
  _searchTimer = setTimeout(()=>fetchSuggest(q), 350);
}

function fetchSuggest(q){
  const url = `${SK_BASE}/req/address?service=address&request=getCoord&version=2.0&crs=epsg:4326&format=json&type=parcel&address=${encodeURIComponent(q)}&key=${SK_KEY}`;
  jsonp(url, (err, data)=>{
    const box = document.getElementById('suggest-box');
    if(err || !data){ box.style.display='none'; return; }
    const items = data?.response?.result || [];
    if(!items.length){ box.style.display='none'; return; }
    box.style.display = 'block';
    box.innerHTML = items.slice(0,6).map((it,i)=>`
      <div class="suggest-item" onclick="selectSuggest(${i})">
        <div class="suggest-addr">${it.text||''}</div>
        <div class="suggest-pnu">${it.zipcode||''}</div>
      </div>`).join('');
    box._items = items;
  }, 5000);
}

function selectSuggest(i){
  const box = document.getElementById('suggest-box');
  const it = box._items[i];
  box.style.display = 'none';
  document.getElementById('addr-inp').value = it.text||'';
  fetchPNU(it.text||'', it.x, it.y);
}

/* ── 검색 버튼 ── */
function doSearch(){
  const q = document.getElementById('addr-inp').value.trim();
  if(!q) return;
  document.getElementById('suggest-box').style.display='none';
  document.getElementById('log-panel').innerHTML='';
  document.getElementById('pnu-badge').style.display='none';
  document.getElementById('reg-result').style.display='none';
  setStep(1,'active');
  showState('loading','주소 검색 중...');
  lg('주소 검색: '+q, 'info');

  const url = `${SK_BASE}/req/address?service=address&request=getCoord&version=2.0&crs=epsg:4326&format=json&type=parcel&address=${encodeURIComponent(q)}&key=${SK_KEY}`;
  jsonp(url, (err, data)=>{
    if(err){ setStep(1,'fail'); showErr('주소 검색 실패', err+'<br><small>인터넷 연결 또는 GitHub Pages 접속 필요</small>'); lg('❌ '+err,'err'); return; }
    const items = data?.response?.result||[];
    lg('검색 결과: '+items.length+'건', items.length?'ok':'warn');
    if(!items.length){
      setStep(1,'fail');
      showErr('주소를 찾을 수 없습니다','시/군/구 포함해서 입력해보세요<br><small>예) 의정부시 녹양동 225-2</small>');
      return;
    }
    setStep(1,'done'); setStep(2,'active');
    const it = items[0];
    lg('선택: '+it.text+' (x='+it.x+', y='+it.y+')', 'ok');
    fetchPNU(it.text, it.x, it.y);
  });
}

/* ── PNU 조회 ── */
function fetchPNU(addr, x, y){
  showState('loading','PNU 조회 중...');
  lg('PNU 조회 (좌표: '+x+', '+y+')', 'info');

  const url = `${SK_BASE}/req/data?service=data&request=GetFeature&data=LP_PA_CBND_BUBUN&key=${SK_KEY}&geomFilter=POINT(${x} ${y})&format=json&size=1`;
  jsonp(url, (err, data)=>{
    if(err){ setStep(2,'fail'); showErr('PNU 조회 실패', err); lg('❌ PNU: '+err,'err'); return; }
    const feat = data?.response?.result?.featureCollection?.features?.[0];
    const pnu = feat?.properties?.pnu||feat?.properties?.PNU||'';
    lg('PNU 응답: '+(pnu||'없음'), pnu?'ok':'err');
    if(!pnu){
      // 응답 내용 전체 출력
      lg('전체응답: '+JSON.stringify(data).slice(0,200), 'dim');
      setStep(2,'fail');
      showErr('PNU를 가져올 수 없습니다','해당 위치에 필지 정보가 없거나<br>주소가 정확하지 않습니다');
      return;
    }
    _pnu = pnu; _addr = addr;
    setStep(2,'done');
    // PNU 배지 표시
    document.getElementById('pnu-badge').style.display='block';
    document.getElementById('pnu-val').textContent = pnu;
    document.getElementById('pnu-addr').textContent = addr;
    lg('✅ PNU 확보: '+pnu, 'ok');
    fetchReg(pnu, addr);
  });
}

/* ── 규제 API 조회 ── */
function fetchReg(pnu, addr){
  showState('loading','규제 정보 조회 중...');
  setStep(3,'active');
  let done=0, r1=null, r2=null;

  function tryRender(){
    done++;
    if(done<2) return;
    setStep(3,'done'); setStep(4,'done'); setStep(5,'active');
    lg('=== 파싱 시작 ===','info');
    try{
      const info = parseReg(r1, r2, addr, pnu);
      lg('용도지역: '+(info.useZone||'없음'), info.useZone?'ok':'warn');
      lg('건폐율: '+info.bcr+'%  용적률: '+info.far+'%','ok');
      lg('규제항목: '+info.rawItems.length+'개', info.rawItems.length?'ok':'warn');
      info.rawItems.forEach(it=>lg('  · '+it,'ok'));
      setStep(5,'done');
      showState('none');
      document.getElementById('state-wait').style.display='none';
      document.getElementById('state-loading').style.display='none';
      renderReg(info);
    }catch(e){
      setStep(5,'fail');
      lg('❌ 파싱 오류: '+e.message,'err');
      showErr('파싱 오류', e.message);
    }
  }

  // API 1
  const url1=`${SK_BASE}/req/data?service=data&request=GetFeature&data=LT_C_UZ&key=${SK_KEY}&attrFilter=pnu:=:${pnu}&format=json&size=10`;
  jsonp(url1,(err,d)=>{
    if(err){ lg('❌ LT_C_UZ: '+err,'err'); setStep(3,'fail'); }
    else {
      const cnt=d?.response?.result?.featureCollection?.features?.length||0;
      lg('✅ LT_C_UZ features: '+cnt, cnt?'ok':'warn');
      if(cnt===0) lg('  → 이 필지의 용도지역 데이터 없음 (API 정상, 데이터 없음)','warn');
      // 첫 번째 feature 필드 출력
      const f=d?.response?.result?.featureCollection?.features?.[0];
      if(f) lg('  필드: '+Object.entries(f.properties||{}).filter(([,v])=>v).map(([k,v])=>k+'='+v).join(', ').slice(0,150),'dim');
    }
    r1=d; tryRender();
  });

  // API 2
  setStep(4,'active');
  const url2=`${SK_BASE}/req/data?service=data&request=GetFeature&data=LT_C_LHBLPN&key=${SK_KEY}&attrFilter=pnu:=:${pnu}&format=json&size=30`;
  jsonp(url2,(err,d)=>{
    if(err){ lg('❌ LT_C_LHBLPN: '+err,'err'); setStep(4,'fail'); }
    else {
      const cnt=d?.response?.result?.featureCollection?.features?.length||0;
      lg('✅ LT_C_LHBLPN features: '+cnt, cnt?'ok':'warn');
      const feats=d?.response?.result?.featureCollection?.features||[];
      feats.forEach((f,i)=>{
        const p=f.properties||{};
        lg('  ['+i+'] '+Object.entries(p).filter(([,v])=>v).map(([k,v])=>k+'='+v).join(' | ').slice(0,120),'dim');
      });
    }
    r2=d; tryRender();
  });
}

/* ── 파싱 ── */
const REG_TABLE={
  '계획관리지역':{bcr:40,far:100,note:'계획적 개발 유도'},
  '보전관리지역':{bcr:20,far:80,note:'자연환경 보전'},
  '생산관리지역':{bcr:20,far:80,note:'농업·임업'},
  '농림지역':{bcr:20,far:80,note:'농업진흥·보전산지'},
  '자연환경보전지역':{bcr:20,far:80,note:'자연생태계 보전'},
  '제1종전용주거지역':{bcr:50,far:100,note:'단독주택만 허용'},
  '제2종전용주거지역':{bcr:50,far:150,note:'공동주택 허용'},
  '제1종일반주거지역':{bcr:60,far:200,note:'4층 이하'},
  '제2종일반주거지역':{bcr:60,far:250,note:'중층 주거'},
  '제3종일반주거지역':{bcr:50,far:300,note:'고층 주거'},
  '준주거지역':{bcr:70,far:500,note:'주거+상업 혼합'},
  '중심상업지역':{bcr:90,far:1500,note:'도심 핵심'},
  '일반상업지역':{bcr:80,far:1300,note:'일반 상업'},
  '근린상업지역':{bcr:70,far:900,note:'근린 상업'},
  '자연녹지지역':{bcr:20,far:100,note:'불가피한 개발만'},
  '생산녹지지역':{bcr:20,far:100,note:'농업적 이용'},
  '보전녹지지역':{bcr:20,far:80,note:'개발 불가에 가까움'},
  '준공업지역':{bcr:70,far:400,note:'공업+주거 혼합'},
  '일반공업지역':{bcr:70,far:350,note:'일반 공업'},
  '전용공업지역':{bcr:70,far:300,note:'중화학공업'},
};

const WARN_KEYS=['접도구역','개발제한구역','농업진흥구역','보전산지','군사시설','문화재','하천구역','재해위험','비행안전','토지거래허가','지구단위계획','도시계획시설','개발행위'];

function parseReg(d1, d2, addr, pnu){
  const info={addr,pnu,useZone:'',useZone2:'',bcr:0,far:0,note:'',rawItems:[]};

  // API1: 용도지역
  try{
    const f1=d1?.response?.result?.featureCollection?.features||[];
    f1.forEach((feat,i)=>{
      const p=feat.properties||{};
      // 가능한 모든 필드명 시도
      const zn = p.uz_cd_nm||p.znNm||p.use_zone_nm||p.prpos_area_nm||
                 p.prpos_area1_nm||p.lclas_nm||p.mlsfc_nm||p.LT_C_UZ||
                 Object.values(p).find(v=>typeof v==='string'&&v.length>2&&
                   (v.includes('지역')||v.includes('지구')||v.includes('구역')))||'';
      if(zn){
        if(!info.useZone) info.useZone=zn;
        else if(!info.useZone2&&zn!==info.useZone) info.useZone2=zn;
        if(!info.rawItems.includes(zn)) info.rawItems.push(zn);
      }
    });
    const tbl=REG_TABLE[info.useZone]||{};
    info.bcr=tbl.bcr||0; info.far=tbl.far||0; info.note=tbl.note||'';
  }catch(e){ lg('파싱오류(UZ): '+e.message,'err'); }

  // API2: 토지이용계획
  try{
    const f2=d2?.response?.result?.featureCollection?.features||[];
    f2.forEach(feat=>{
      const p=feat.properties||{};
      const nm = p.reglt_cde_nm||p.regltnNm||p.regl_nm||p.use_nm||
                 p.prpos_area_nm||p.pnu_area_nm||
                 Object.values(p).find(v=>typeof v==='string'&&v.length>2&&v!==pnu)||'';
      if(nm&&!info.rawItems.includes(nm)) info.rawItems.push(nm);
      const hit=p.cnflc_at||p.cnflcAt||'';
      if(nm&&(hit==='Y'||hit==='1')&&!info.rawItems.includes('⚠️저촉:'+nm))
        info.rawItems.push('⚠️저촉:'+nm);
    });
  }catch(e){ lg('파싱오류(LHBLPN): '+e.message,'err'); }

  return info;
}

/* ── 렌더링 ── */
function renderReg(info){
  const el = document.getElementById('reg-result');
  el.style.display = 'block';

  const warnItems = info.rawItems.filter(it=>WARN_KEYS.some(k=>it.includes(k)));
  const badges = [];
  if(info.useZone) badges.push({t:info.useZone,c:'badge-info'});
  warnItems.slice(0,3).forEach(it=>badges.push({t:'⚠️ '+it.replace('⚠️저촉:',''),c:'badge-warn'}));
  if(!warnItems.length && info.useZone) badges.push({t:'특수규제 없음',c:'badge-ok'});

  let html = '';

  // 주소 헤더
  html+=`<div class="reg-addr-box">
    <div class="reg-addr-title">${info.addr||'주소 정보 없음'}</div>
    <div class="reg-addr-pnu">PNU: ${info.pnu}</div>
  </div>`;

  // 게이지
  if(info.bcr||info.far){
    html+=`<div class="gauge-row">
      <div class="gauge-box">
        <div class="gauge-label">건폐율 한도</div>
        <div class="gauge-val" style="color:#3b82f6;">${info.bcr}<small style="font-size:12px;color:#5a7090;">%</small></div>
        <div class="gauge-bar"><div class="gauge-fill" id="bcr-bar" style="width:0%;background:#3b82f6;"></div></div>
      </div>
      <div class="gauge-box">
        <div class="gauge-label">용적률 한도</div>
        <div class="gauge-val" style="color:#8b5cf6;">${info.far}<small style="font-size:12px;color:#5a7090;">%</small></div>
        <div class="gauge-bar"><div class="gauge-fill" id="far-bar" style="width:0%;background:#8b5cf6;"></div></div>
      </div>
    </div>`;
    setTimeout(()=>{
      const bb=document.getElementById('bcr-bar');
      const fb=document.getElementById('far-bar');
      if(bb) bb.style.width=Math.min(info.bcr,100)+'%';
      if(fb) fb.style.width=Math.min(info.far/15,100)+'%';
    },100);
  }

  // 뱃지
  html+=`<div class="badges">${badges.map(b=>`<span class="badge ${b.c}">${b.t}</span>`).join('')}</div>`;

  // 용도지역 섹션
  if(info.useZone){
    html+=`<div class="sec-card" style="background:rgba(59,130,246,.06);border-color:#3b82f6;">
      <div class="sec-title-row"><span class="sec-name" style="color:#3b82f6;">🗺 용도지역·지구</span><span class="sec-law">국토계획법 §36</span></div>
      <div class="sec-row"><span class="sec-label">용도지역</span><span class="sec-val">${info.useZone}</span></div>
      ${info.useZone2?`<div class="sec-row"><span class="sec-label">용도지구</span><span class="sec-val">${info.useZone2}</span></div>`:''}
      <div class="sec-row"><span class="sec-label">건폐율</span><span class="sec-val" style="color:#3b82f6;">${info.bcr||'확인필요'}%</span></div>
      <div class="sec-row"><span class="sec-label">용적률</span><span class="sec-val" style="color:#8b5cf6;">${info.far||'확인필요'}%</span></div>
      <div class="sec-row"><span class="sec-label">건축선 이격</span><span class="sec-val">도로경계 1m 이상</span></div>
      ${info.note?`<div class="sec-note">${info.note}</div>`:''}
    </div>`;
  }

  // 규제 항목
  if(info.rawItems.filter(it=>!REG_TABLE[it]).length){
    const regItems = info.rawItems.filter(it=>!REG_TABLE[it]&&it!==info.useZone&&it!==info.useZone2);
    if(regItems.length){
      html+=`<div class="sec-card" style="background:rgba(239,68,68,.06);border-color:#ef4444;">
        <div class="sec-title-row"><span class="sec-name" style="color:#ef4444;">⚠️ 토지이용 규제</span><span class="sec-law">토지이용계획</span></div>
        ${regItems.map(it=>`<div class="sec-row">
          <span class="sec-label">${it.replace('⚠️저촉:','')}</span>
          <span class="sec-val" style="color:${it.startsWith('⚠️')?'#ef4444':'#dde4f2'};">${it.startsWith('⚠️')?'⚠️ 저촉':'해당'}</span>
        </div>`).join('')}
      </div>`;
    }
  }

  // 데이터 없음
  if(!info.useZone && !info.rawItems.length){
    html+=`<div class="sec-card" style="background:rgba(245,158,11,.06);border-color:#f59e0b;text-align:center;padding:20px;">
      <div style="font-size:24px;margin-bottom:8px;">📋</div>
      <div style="font-weight:800;margin-bottom:4px;color:#f59e0b;">API 응답은 정상이나 데이터 없음</div>
      <div style="font-size:11px;color:#5a7090;">해당 PNU의 용도지역 정보가<br>브이월드에 등록되지 않았을 수 있습니다<br>토지이음에서 직접 확인하세요</div>
    </div>`;
  }

  // 토지이음
  html+=`<button class="luris-btn" onclick="window.open('https://www.eum.go.kr/web/ar/lu/luLandDtl.jsp?selSido=&pnu=${info.pnu}','_blank')">🔗 토지이음에서 공식 확인</button>`;

  el.innerHTML = html;
}

// 외부 클릭 시 자동완성 닫기
document.addEventListener('click', e=>{
  if(!e.target.closest('.search-wrap'))
    document.getElementById('suggest-box').style.display='none';
});
</script>
</body>
</html>
