<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>법적규제 API 디버그</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07090f;color:#dde4f2;font-family:'Noto Sans KR',monospace,sans-serif;padding:14px;font-size:13px;}
h2{font-size:14px;font-weight:800;color:#f59e0b;margin:14px 0 8px;}
input{width:100%;background:#131925;border:1px solid #1e2a3e;border-radius:8px;padding:9px 12px;color:#dde4f2;font-size:13px;font-family:inherit;outline:none;margin-bottom:8px;}
.btn{width:100%;padding:11px;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:6px;}
.btn-blue{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;}
.btn-green{background:linear-gradient(135deg,#059669,#047857);color:#fff;}
.btn-red{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;}
.btn-gray{background:#1e2a3e;color:#dde4f2;}
.log{background:#030508;border:1px solid #1e2a3e;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;line-height:1.8;min-height:120px;max-height:300px;overflow-y:auto;margin-bottom:8px;white-space:pre-wrap;word-break:break-all;}
.ok{color:#10b981;}
.err{color:#ef4444;}
.warn{color:#f59e0b;}
.info{color:#06c8d8;}
.dim{color:#5a7090;}
.card{background:#0d1117;border:1px solid #1e2a3e;border-radius:10px;padding:12px;margin-bottom:10px;}
.result-card{background:#0d1117;border-left:3px solid;border-radius:0 10px 10px 0;padding:10px;margin-bottom:6px;font-size:11px;}
.row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.row:last-child{border:none;}
label{font-size:10px;color:#5a7090;display:block;margin-bottom:4px;font-weight:700;letter-spacing:.5px;}
</style>
</head>
<body>

<div style="font-size:11px;color:#f59e0b;letter-spacing:2px;margin-bottom:4px;">법적규제 API 디버그 툴</div>
<div style="font-size:17px;font-weight:800;margin-bottom:14px;">🔬 실시간 API 테스트</div>

<!-- STEP 1: 환경 확인 -->
<div class="card">
  <h2>STEP 1 · 환경 확인</h2>
  <button class="btn btn-gray" onclick="checkEnv()">🌐 현재 환경 확인</button>
  <div class="log" id="log-env">버튼을 눌러 환경을 확인하세요</div>
</div>

<!-- STEP 2: PNU 직접 입력 -->
<div class="card">
  <h2>STEP 2 · PNU로 API 직접 테스트</h2>
  <label>PNU 번호 (19자리)</label>
  <input type="text" id="pnu-input" value="4115011100102250002" placeholder="경계말뚝에서 확인한 PNU 입력">
  <button class="btn btn-blue" onclick="testLTCUZ()">① LT_C_UZ 용도지역 조회</button>
  <button class="btn btn-blue" onclick="testLTCLHBLPN()">② LT_C_LHBLPN 토지이용계획 조회</button>
  <button class="btn btn-green" onclick="testBoth()">③ 두 API 동시 조회 (실제 앱과 동일)</button>
  <div class="log" id="log-api">API 조회 결과가 여기 표시됩니다</div>
</div>

<!-- STEP 3: 결과 렌더 -->
<div class="card">
  <h2>STEP 3 · 파싱 결과</h2>
  <div id="result-render" style="color:#5a7090;font-size:12px;">API 조회 후 결과가 표시됩니다</div>
</div>

<!-- STEP 4: 시공관리 앱 연동 테스트 -->
<div class="card">
  <h2>STEP 4 · 시공관리 앱 연동 테스트</h2>
  <div style="font-size:11px;color:#5a7090;margin-bottom:8px;">시공관리 앱의 window.skPNU, window._skRegLoadInner 존재 여부 확인</div>
  <button class="btn btn-green" onclick="testAppConnect()">🔗 앱 연동 상태 확인</button>
  <button class="btn btn-red" onclick="forceLoad()">⚡ 강제 규제 조회 실행</button>
  <div class="log" id="log-app">앱 연동 테스트 결과</div>
</div>

<script>
const SK_KEY = 'A512471A-C75B-3644-BCCA-B3DC1D95254D';
const SK_BASE = 'https://api.vworld.kr';
const SK_DOMAIN = location.hostname || 'wisestar823.github.io';

function log(id, msg, cls=''){
  const el = document.getElementById(id);
  const time = new Date().toLocaleTimeString('ko-KR');
  el.innerHTML += `<span class="${cls}">[${time}] ${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}
function logClear(id){ document.getElementById(id).innerHTML = ''; }

// ── STEP 1: 환경 확인 ──
function checkEnv(){
  logClear('log-env');
  const host = location.hostname;
  const proto = location.protocol;
  const href = location.href;

  log('log-env', `프로토콜: ${proto}`, proto==='https:'?'ok':'err');
  log('log-env', `호스트: ${host}`, host.includes('github.io')?'ok':'warn');
  log('log-env', `URL: ${href.slice(0,60)}`, 'dim');
  log('log-env', `브이월드 domain: ${SK_DOMAIN}`, 'info');

  if(proto !== 'https:'){
    log('log-env', '❌ HTTPS 필요! 로컬 파일에서는 API 차단됨', 'err');
  } else if(!host.includes('github.io')){
    log('log-env', '⚠️ GitHub Pages가 아님 — domain 인증 실패 가능', 'warn');
  } else {
    log('log-env', '✅ GitHub Pages 환경 — API 작동 가능', 'ok');
  }

  // 네트워크 확인
  log('log-env', `온라인: ${navigator.onLine}`, navigator.onLine?'ok':'err');
}

// ── JSONP 헬퍼 ──
function jsonpCall(url, cb, timeoutMs=8000){
  const fn = '_dbg_' + Date.now() + '_' + Math.random().toString(36).slice(2,5);
  const fullUrl = url + '&domain=' + SK_DOMAIN + '&callback=' + fn;

  window[fn] = (d) => {
    try{ delete window[fn]; }catch(e){}
    cb(null, d);
  };

  const s = document.createElement('script');
  s.onerror = (e) => {
    try{ delete window[fn]; }catch(e){}
    cb('스크립트 로드 실패 (네트워크/CORS 차단)', null);
  };
  s.src = fullUrl;
  document.head.appendChild(s);

  setTimeout(() => {
    if(window[fn]){
      delete window[fn];
      cb('타임아웃 ('+timeoutMs/1000+'초 초과)', null);
    }
  }, timeoutMs);

  return fullUrl;
}

// ── STEP 2: LT_C_UZ 테스트 ──
function testLTCUZ(){
  const pnu = document.getElementById('pnu-input').value.trim();
  if(!pnu){ alert('PNU를 입력하세요'); return; }
  logClear('log-api');
  log('log-api', `LT_C_UZ 조회 시작 (PNU: ${pnu})`, 'info');

  const url = `${SK_BASE}/req/data?service=data&request=GetFeature&data=LT_C_UZ&key=${SK_KEY}&attrFilter=pnu:=:${pnu}&format=json&size=10`;
  const fullUrl = jsonpCall(url, (err, data) => {
    if(err){
      log('log-api', `❌ LT_C_UZ 실패: ${err}`, 'err');
      return;
    }
    if(!data){
      log('log-api', '❌ 응답 없음 (null)', 'err');
      return;
    }
    const status = data?.response?.status;
    log('log-api', `응답 status: ${status}`, status==='OK'?'ok':'warn');
    const features = data?.response?.result?.featureCollection?.features||[];
    log('log-api', `features 수: ${features.length}`, features.length?'ok':'warn');
    if(features.length){
      const p = features[0].properties||{};
      log('log-api', `필드 목록: ${Object.keys(p).join(', ')}`, 'info');
      Object.entries(p).forEach(([k,v])=>{
        if(v) log('log-api', `  ${k}: ${v}`, 'ok');
      });
    } else {
      log('log-api', '⚠️ features가 비어있음 — PNU가 맞는지 확인', 'warn');
      log('log-api', `전체 응답: ${JSON.stringify(data).slice(0,300)}`, 'dim');
    }
  });
  log('log-api', `요청 URL: ${fullUrl.slice(0,80)}...`, 'dim');
}

// ── LT_C_LHBLPN 테스트 ──
function testLTCLHBLPN(){
  const pnu = document.getElementById('pnu-input').value.trim();
  if(!pnu){ alert('PNU를 입력하세요'); return; }
  logClear('log-api');
  log('log-api', `LT_C_LHBLPN 조회 시작 (PNU: ${pnu})`, 'info');

  const url = `${SK_BASE}/req/data?service=data&request=GetFeature&data=LT_C_LHBLPN&key=${SK_KEY}&attrFilter=pnu:=:${pnu}&format=json&size=30`;
  jsonpCall(url, (err, data) => {
    if(err){ log('log-api', `❌ 실패: ${err}`, 'err'); return; }
    const status = data?.response?.status;
    log('log-api', `응답 status: ${status}`, status==='OK'?'ok':'warn');
    const features = data?.response?.result?.featureCollection?.features||[];
    log('log-api', `규제항목 수: ${features.length}`, features.length?'ok':'warn');
    features.forEach((f,i)=>{
      const p = f.properties||{};
      const nm = p.reglt_cde_nm||p.regltnNm||p.regl_nm||p.use_nm||Object.values(p).find(v=>typeof v==='string'&&v.length>1)||'(없음)';
      log('log-api', `  [${i+1}] ${nm}`, 'ok');
    });
    if(!features.length){
      log('log-api', `전체 응답: ${JSON.stringify(data).slice(0,400)}`, 'dim');
    }
  });
}

// ── 두 API 동시 조회 ──
function testBoth(){
  const pnu = document.getElementById('pnu-input').value.trim();
  if(!pnu){ alert('PNU를 입력하세요'); return; }
  logClear('log-api');
  log('log-api', '=== 두 API 동시 조회 시작 ===', 'info');

  let done=0, r1=null, r2=null;
  function tryRender(){
    done++;
    if(done<2) return;
    log('log-api', '=== 두 API 완료 → 파싱 시작 ===', 'info');
    const info = parseReg(r1, r2);
    log('log-api', `용도지역: ${info.useZone||'(없음)'}`, info.useZone?'ok':'warn');
    log('log-api', `건폐율: ${info.bcr}%  용적률: ${info.far}%`, 'ok');
    log('log-api', `규제항목 수: ${info.rawItems.length}`, info.rawItems.length?'ok':'warn');
    info.rawItems.forEach(it => log('log-api', `  · ${it}`, 'ok'));
    renderResult(info);
  }

  const url1 = `${SK_BASE}/req/data?service=data&request=GetFeature&data=LT_C_UZ&key=${SK_KEY}&attrFilter=pnu:=:${pnu}&format=json&size=10`;
  jsonpCall(url1, (err,d)=>{
    if(err) log('log-api', `❌ LT_C_UZ: ${err}`, 'err');
    else log('log-api', `✅ LT_C_UZ 응답 (features: ${d?.response?.result?.featureCollection?.features?.length||0})`, 'ok');
    r1=d; tryRender();
  });

  const url2 = `${SK_BASE}/req/data?service=data&request=GetFeature&data=LT_C_LHBLPN&key=${SK_KEY}&attrFilter=pnu:=:${pnu}&format=json&size=30`;
  jsonpCall(url2, (err,d)=>{
    if(err) log('log-api', `❌ LT_C_LHBLPN: ${err}`, 'err');
    else log('log-api', `✅ LT_C_LHBLPN 응답 (features: ${d?.response?.result?.featureCollection?.features?.length||0})`, 'ok');
    r2=d; tryRender();
  });
}

// ── 파싱 ──
const REG_TABLE={
  '계획관리지역':{bcr:40,far:100},'보전관리지역':{bcr:20,far:80},
  '생산관리지역':{bcr:20,far:80},'농림지역':{bcr:20,far:80},
  '자연환경보전지역':{bcr:20,far:80},'제1종전용주거지역':{bcr:50,far:100},
  '제2종전용주거지역':{bcr:50,far:150},'제1종일반주거지역':{bcr:60,far:200},
  '제2종일반주거지역':{bcr:60,far:250},'제3종일반주거지역':{bcr:50,far:300},
  '준주거지역':{bcr:70,far:500},'중심상업지역':{bcr:90,far:1500},
  '일반상업지역':{bcr:80,far:1300},'근린상업지역':{bcr:70,far:900},
  '자연녹지지역':{bcr:20,far:100},'생산녹지지역':{bcr:20,far:100},
  '보전녹지지역':{bcr:20,far:80},
};

function parseReg(d1, d2){
  const info={useZone:'',useZone2:'',bcr:0,far:0,rawItems:[],categorized:{}};
  try{
    const f1=d1?.response?.result?.featureCollection?.features||[];
    f1.forEach((feat,i)=>{
      const p=feat.properties||{};
      const zn=p.uz_cd_nm||p.znNm||p.use_zone_nm||p.prpos_area_nm||
               p.prpos_area1_nm||p.lclas_nm||p.mlsfc_nm||
               Object.values(p).find(v=>typeof v==='string'&&v.length>2&&v.includes('지역'))||'';
      if(zn){
        if(!info.useZone) info.useZone=zn;
        else if(!info.useZone2) info.useZone2=zn;
        if(!info.rawItems.includes(zn)) info.rawItems.push(zn);
      }
    });
    const tbl=REG_TABLE[info.useZone]||{};
    info.bcr=tbl.bcr||0; info.far=tbl.far||0;
  }catch(e){}
  try{
    const f2=d2?.response?.result?.featureCollection?.features||[];
    f2.forEach(feat=>{
      const p=feat.properties||{};
      const nm=p.reglt_cde_nm||p.regltnNm||p.regl_nm||p.use_nm||
               p.prpos_area_nm||p.pnu_area_nm||
               Object.values(p).find(v=>typeof v==='string'&&v.length>2)||'';
      if(nm&&!info.rawItems.includes(nm)) info.rawItems.push(nm);
      const hit=p.cnflc_at||p.cnflcAt||'';
      if(nm&&(hit==='Y'||hit==='1')&&!info.rawItems.includes('⚠️저촉:'+nm))
        info.rawItems.push('⚠️저촉:'+nm);
    });
  }catch(e){}
  return info;
}

// ── 결과 렌더 ──
function renderResult(info){
  const el = document.getElementById('result-render');
  if(!info.useZone && !info.rawItems.length){
    el.innerHTML = '<div style="color:#ef4444;font-size:12px;">⚠️ API 응답은 왔지만 파싱 결과가 비어있음<br>PNU가 올바른지, 해당 필지에 데이터가 있는지 확인 필요</div>';
    return;
  }
  let html = '';
  if(info.useZone){
    html += `<div class="result-card" style="border-color:#3b82f6;background:rgba(59,130,246,.06);">
      <div style="font-size:11px;font-weight:800;color:#3b82f6;margin-bottom:6px;">🗺 용도지역</div>
      <div class="row"><span style="color:#5a7090;">용도지역</span><span style="font-weight:700;">${info.useZone}</span></div>
      ${info.useZone2?`<div class="row"><span style="color:#5a7090;">용도지구</span><span style="font-weight:700;">${info.useZone2}</span></div>`:''}
      <div class="row"><span style="color:#5a7090;">건폐율</span><span style="font-weight:700;color:#3b82f6;">${info.bcr||'확인필요'}%</span></div>
      <div class="row"><span style="color:#5a7090;">용적률</span><span style="font-weight:700;color:#8b5cf6;">${info.far||'확인필요'}%</span></div>
    </div>`;
  }
  if(info.rawItems.length){
    html += `<div class="result-card" style="border-color:#10b981;background:rgba(16,185,129,.06);">
      <div style="font-size:11px;font-weight:800;color:#10b981;margin-bottom:6px;">📋 규제 항목 (${info.rawItems.length}개)</div>
      ${info.rawItems.map(it=>`<div class="row">
        <span style="color:${it.startsWith('⚠️')?'#ef4444':'#5a7090'};">${it}</span>
      </div>`).join('')}
    </div>`;
  }
  el.innerHTML = html || '<div style="color:#10b981;">✅ 특수 규제 없음</div>';
}

// ── STEP 4: 앱 연동 확인 ──
function testAppConnect(){
  logClear('log-app');
  log('log-app', '=== 시공관리 앱 연동 확인 ===', 'info');

  const checks = [
    ['window.skPNU', window.skPNU],
    ['window.skLotMeta', window.skLotMeta],
    ['window._skRegLoadInner', window._skRegLoadInner],
    ['window._skRegReset', window._skRegReset],
    ['window.skRegLoad', window.skRegLoad],
    ['window.skSubTab', window.skSubTab],
  ];

  checks.forEach(([name, val])=>{
    if(val !== undefined){
      const display = typeof val === 'function' ? '함수 ✅' : (val || '(빈값)');
      log('log-app', `${name}: ${display}`, val?'ok':'warn');
    } else {
      log('log-app', `${name}: 없음 ❌`, 'err');
    }
  });

  if(window.skPNU){
    log('log-app', `\n현재 PNU: ${window.skPNU}`, 'ok');
    document.getElementById('pnu-input').value = window.skPNU;
    log('log-app', '→ STEP 2의 PNU 입력란에 자동 입력됨', 'info');
  } else {
    log('log-app', '\n⚠️ skPNU 없음 → 주소검색 먼저 필요', 'warn');
  }
}

function forceLoad(){
  logClear('log-app');
  log('log-app', '=== 강제 규제 조회 실행 ===', 'info');

  if(!window.skPNU){
    log('log-app', '❌ skPNU 없음 — 시공관리 앱에서 주소 검색 필요', 'err');
    return;
  }
  log('log-app', `PNU: ${window.skPNU}`, 'ok');

  if(window._skRegReset){
    window._skRegReset();
    log('log-app', '✅ _skRegReset() 호출', 'ok');
  }
  if(window._skRegLoadInner){
    window._skRegLoadInner();
    log('log-app', '✅ _skRegLoadInner() 호출', 'ok');
    log('log-app', '→ 시공관리 앱의 ⚖️ 법적규제 탭 확인하세요', 'info');
  } else {
    log('log-app', '❌ _skRegLoadInner 없음', 'err');
    log('log-app', '→ 이 파일이 시공관리 앱과 같은 페이지에 없음', 'warn');
    log('log-app', '→ STEP 2에서 직접 API 테스트 하세요', 'info');
  }
}

// 페이지 로드 시 자동 환경 확인
window.onload = () => checkEnv();
</script>
</body>
</html>
