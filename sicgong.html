<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>토지 법적규제 조회</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04080f;
  --s1:#080e1a;
  --s2:#0d1628;
  --b1:#1a2840;
  --b2:#243552;
  --tx:#e8edf8;
  --soft:#5a7090;
  --accent:#f0a500;
  --accent2:#e06020;
  --blue:#2a6fff;
  --teal:#00c8b0;
  --green:#18c96a;
  --red:#ff4560;
  --purple:#9060ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  color:var(--tx);
  font-family:'Nanum Gothic',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* 배경 그리드 */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(42,111,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(42,111,255,.03) 1px,transparent 1px);
  background-size:32px 32px;
  pointer-events:none;
}

/* 헤더 */
.header{
  padding:18px 20px 14px;
  border-bottom:1px solid var(--b1);
  background:rgba(8,14,26,.9);
  backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:100;
}
.header-top{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.logo{
  font-size:11px;font-weight:800;letter-spacing:3px;
  color:var(--accent);text-transform:uppercase;
}
.logo span{color:var(--tx);}

/* 검색 */
.search-bar{
  display:flex;gap:8px;
  background:var(--s2);
  border:1px solid var(--b2);
  border-radius:10px;
  padding:4px 4px 4px 14px;
  transition:border-color .2s;
}
.search-bar:focus-within{border-color:var(--accent);}
.search-bar input{
  flex:1;background:none;border:none;outline:none;
  color:var(--tx);font-family:'Nanum Gothic',sans-serif;
  font-size:14px;
}
.search-bar input::placeholder{color:var(--soft);}
.search-btn{
  padding:8px 16px;border:none;border-radius:8px;
  background:var(--accent);color:#000;
  font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:800;
  cursor:pointer;white-space:nowrap;
}
.search-btn:active{opacity:.8;}

/* 자동완성 */
.suggest{
  position:absolute;left:20px;right:20px;
  background:var(--s1);border:1px solid var(--b2);
  border-radius:10px;margin-top:4px;z-index:200;
  overflow:hidden;display:none;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.suggest.show{display:block;}
.suggest-item{
  padding:12px 16px;font-size:13px;cursor:pointer;
  border-bottom:1px solid var(--b1);
  transition:background .15s;
}
.suggest-item:last-child{border:none;}
.suggest-item:hover{background:var(--s2);}
.suggest-item strong{color:var(--accent);}

/* 메인 */
main{padding:16px 20px 40px;max-width:600px;margin:0 auto;}

/* 빈 상태 */
.empty{
  text-align:center;padding:60px 20px;
}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.4;}
.empty-title{font-size:16px;font-weight:800;color:var(--soft);margin-bottom:6px;}
.empty-sub{font-size:12px;color:var(--soft);line-height:1.7;}

/* 로딩 */
.loading{display:none;text-align:center;padding:50px 20px;}
.loading-ring{
  width:44px;height:44px;border:3px solid var(--b2);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* 결과 */
.result{display:none;}

/* 필지 헤더 */
.lot-header{
  background:var(--s1);border:1px solid var(--b2);
  border-radius:14px;padding:16px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.lot-header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}
.lot-addr{font-size:15px;font-weight:800;margin-bottom:4px;}
.lot-pnu{font-size:10px;color:var(--soft);font-family:'JetBrains Mono',monospace;}

/* 건폐율/용적률 */
.ratio-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.ratio-card{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:12px;padding:14px;
}
.ratio-label{font-size:10px;color:var(--soft);margin-bottom:6px;letter-spacing:.5px;}
.ratio-val{
  font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;
  margin-bottom:8px;
}
.ratio-bar{height:4px;background:var(--b2);border-radius:2px;overflow:hidden;}
.ratio-fill{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.16,1,.3,1);}
.ratio-card.bcr .ratio-val{color:var(--blue);}
.ratio-card.bcr .ratio-fill{background:var(--blue);}
.ratio-card.far .ratio-val{color:var(--purple);}
.ratio-card.far .ratio-fill{background:var(--purple);}

/* 뱃지 요약 */
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.badge{
  font-size:11px;font-weight:700;padding:4px 10px;
  border-radius:5px;
}
.badge-warn{background:rgba(255,69,96,.15);color:var(--red);border:1px solid rgba(255,69,96,.3);}
.badge-ok{background:rgba(24,201,106,.12);color:var(--green);border:1px solid rgba(24,201,106,.2);}
.badge-info{background:rgba(42,111,255,.12);color:#6090ff;border:1px solid rgba(42,111,255,.2);}
.badge-neutral{background:rgba(90,112,144,.15);color:var(--soft);border:1px solid rgba(90,112,144,.2);}

/* 섹션 */
.sec{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:12px;margin-bottom:10px;overflow:hidden;
}
.sec-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;cursor:pointer;
  border-bottom:1px solid transparent;
  transition:background .15s;
  user-select:none;
}
.sec-hdr:hover{background:rgba(255,255,255,.03);}
.sec.open .sec-hdr{border-bottom-color:var(--b1);}
.sec-title{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;}
.sec-icon{font-size:16px;}
.sec-badge{
  font-size:9px;font-weight:700;padding:2px 7px;
  border-radius:3px;background:rgba(255,69,96,.15);color:var(--red);
}
.sec-badge.ok{background:rgba(24,201,106,.12);color:var(--green);}
.sec-chevron{color:var(--soft);font-size:11px;transition:transform .2s;}
.sec.open .sec-chevron{transform:rotate(180deg);}
.sec-body{display:none;padding:10px 14px;}
.sec.open .sec-body{display:block;}
.sec-law{font-size:9px;color:var(--soft);margin-bottom:8px;font-family:'JetBrains Mono',monospace;}
.sec-row{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);
  font-size:11px;gap:8px;
}
.sec-row:last-child{border:none;}
.sec-row-label{color:var(--soft);flex:1;}
.sec-row-val{font-weight:700;text-align:right;flex:1.2;
  color:var(--tx);}
.sec-row-val.warn{color:var(--red);}
.sec-row-val.ok{color:var(--green);}
.sec-note{
  margin-top:8px;padding:8px 10px;
  background:rgba(240,165,0,.06);border-left:2px solid var(--accent);
  border-radius:0 6px 6px 0;font-size:10px;color:var(--soft);line-height:1.7;
}

/* 토지이음 버튼 */
.luris-btn{
  width:100%;padding:14px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#0f5a80,#0a3d60);
  color:#fff;font-family:'Nanum Gothic',sans-serif;
  font-size:14px;font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:14px;
  border:1px solid rgba(0,200,176,.2);
}
.luris-btn:active{opacity:.8;}

/* 오류 */
.err-box{
  background:rgba(255,69,96,.08);border:1px solid rgba(255,69,96,.2);
  border-radius:12px;padding:16px;text-align:center;
  display:none;
}
.err-title{font-size:13px;font-weight:800;color:var(--red);margin-bottom:6px;}
.err-sub{font-size:11px;color:var(--soft);}

/* 애니메이션 */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .35s ease forwards;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">DUJON <span>HOUSING</span></div>
    <div style="margin-left:auto;font-size:10px;color:var(--soft);">토지 법적규제 조회</div>
  </div>
  <div style="position:relative;">
    <div class="search-bar">
      <input type="text" id="addr-input" placeholder="주소 입력 (예: 의정부시 녹양동 225-2)" oninput="onInput()" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="search-btn" onclick="doSearch()">조회</button>
    </div>
    <div class="suggest" id="suggest"></div>
  </div>
</div>

<main>
  <!-- 빈 상태 -->
  <div class="empty" id="empty">
    <div class="empty-icon">⚖️</div>
    <div class="empty-title">주소를 입력하세요</div>
    <div class="empty-sub">주소 검색 후 해당 필지의<br>용도지역, 접도구역, 지구단위계획 등<br>모든 법적 규제를 한눈에 확인합니다</div>
  </div>

  <!-- 로딩 -->
  <div class="loading" id="loading">
    <div class="loading-ring"></div>
    <div style="font-size:12px;color:var(--soft);">규제 정보 조회 중...</div>
  </div>

  <!-- 오류 -->
  <div class="err-box" id="err-box">
    <div class="err-title" id="err-title">조회 실패</div>
    <div class="err-sub" id="err-sub"></div>
  </div>

  <!-- 결과 -->
  <div class="result" id="result"></div>
</main>

<script>
const SK_KEY='A512471A-C75B-3644-BCCA-B3DC1D95254D';
const SK_BASE='https://api.vworld.kr';
let _searchTimer=null;
let _currentPNU='';

// ── 자동완성 ──
function onInput(){
  clearTimeout(_searchTimer);
  const q=document.getElementById('addr-input').value.trim();
  const sug=document.getElementById('suggest');
  if(q.length<2){sug.classList.remove('show');return;}
  _searchTimer=setTimeout(()=>fetchSuggest(q),400);
}

function fetchSuggest(q){
  jsonp(`${SK_BASE}/req/address?service=address&request=getCoord&version=2.0&crs=epsg:4326&format=json&type=parcel&address=${encodeURIComponent(q)}&key=${SK_KEY}`,(d)=>{
    const sug=document.getElementById('suggest');
    const items=d?.response?.result||[];
    if(!items.length){sug.classList.remove('show');return;}
    sug.innerHTML=items.slice(0,6).map(it=>`
      <div class="suggest-item" onclick="selectAddr('${esc(it.text||'')}','${it.x||''}','${it.y||''}','${it.zipcode||''}')">
        <strong>${(it.text||'').slice(0,20)}</strong>
        <span style="color:var(--soft);font-size:11px;"> · ${it.zipcode||''}</span>
      </div>`).join('');
    sug.classList.add('show');
  });
}

function selectAddr(addr,x,y,zip){
  document.getElementById('addr-input').value=addr;
  document.getElementById('suggest').classList.remove('show');
  // PNU 조회
  show('loading');
  jsonp(`${SK_BASE}/req/data?service=data&request=GetFeature&data=LP_PA_CBND_BUBUN&key=${SK_KEY}&geomFilter=POINT(${x} ${y})&format=json&size=1`,(d)=>{
    const pnu=d?.response?.result?.featureCollection?.features?.[0]?.properties?.pnu;
    if(!pnu){showErr('PNU 조회 실패','주소를 더 정확하게 입력해주세요');return;}
    _currentPNU=pnu;
    fetchReg(pnu,addr);
  });
}

function doSearch(){
  const q=document.getElementById('addr-input').value.trim();
  if(!q)return;
  document.getElementById('suggest').classList.remove('show');
  show('loading');
  jsonp(`${SK_BASE}/req/address?service=address&request=getCoord&version=2.0&crs=epsg:4326&format=json&type=parcel&address=${encodeURIComponent(q)}&key=${SK_KEY}`,(d)=>{
    const items=d?.response?.result||[];
    if(!items.length){showErr('주소를 찾을 수 없습니다','더 자세한 주소를 입력해보세요');return;}
    const it=items[0];
    selectAddr(it.text||q,it.x,it.y,it.zipcode||'');
  });
}

// ── 규제 조회 ──
function fetchReg(pnu,addr){
  let done=0,r1=null,r2=null;
  function tryRender(){
    done++;
    if(done<2)return;
    renderResult(parseReg(r1,r2),addr,pnu);
  }
  jsonp(`${SK_BASE}/req/data?service=data&request=GetFeature&data=LT_C_UZ&key=${SK_KEY}&domain=wisestar823.github.io&attrFilter=pnu:=:${pnu}&format=json&size=10`,(d)=>{r1=d;tryRender();});
  jsonp(`${SK_BASE}/req/data?service=data&request=GetFeature&data=LT_C_LHBLPN&key=${SK_KEY}&domain=wisestar823.github.io&attrFilter=pnu:=:${pnu}&format=json&size=30`,(d)=>{r2=d;tryRender();});
}

  {cat:'항공·비행 제한',color:'#8b5cf6',icon:'✈️',keys:['비행안전구역','항공장애물'],law:'항공법',warn:true,note:'높이 제한 준수 필수'},
  {cat:'토지거래허가구역',color:'#f59e0b',icon:'📋',keys:['토지거래허가구역'],law:'국토계획법 §117',warn:true},
  {cat:'친환경·특구',color:'#22c55e',icon:'🌱',keys:['친환경에너지특구','자원특구'],law:'특구법',warn:false},
  {cat:'경제자유구역·특구',color:'#06b6d4',icon:'🏭',keys:['경제자유구역','산업단지'],law:'경제자유구역법',warn:false},
];

function parseReg(d1,d2){
  const info={useZone:'',useZone2:'',bcr:0,far:0,solar:'조례 확인',note:'',rawItems:[],categorized:{}};
  try{
    const f1=d1?.response?.result?.featureCollection?.features||[];
    f1.forEach((feat,i)=>{
      const p=feat.properties||{};
      const zn=p.uz_cd_nm||p.znNm||p.use_zone_nm||p.prpos_area_nm||p.prpos_area1_nm||p.lclas_nm||'';
      if(zn&&zn.length>1){
        if(i===0&&!info.useZone) info.useZone=zn;
        else if(i===1&&!info.useZone2) info.useZone2=zn;
        if(!info.rawItems.includes(zn)) info.rawItems.push(zn);
      }
    });
    const tbl=REG_TABLE[info.useZone]||{};
    info.bcr=tbl.bcr||0; info.far=tbl.far||0;
    info.solar=tbl.solar||'조례 확인'; info.note=tbl.note||'';
  }catch(e){}
  try{
    const f2=d2?.response?.result?.featureCollection?.features||[];
    f2.forEach(feat=>{
      const p=feat.properties||{};
      const nm=p.reglt_cde_nm||p.regltnNm||p.regl_nm||p.use_nm||p.prpos_area_nm||'';
      if(nm&&nm.length>1&&!info.rawItems.includes(nm)) info.rawItems.push(nm);
      const hit=p.cnflc_at||p.cnflcAt||'';
      if(nm&&(hit==='Y'||hit==='1')&&!info.rawItems.includes('⚠️저촉:'+nm)) info.rawItems.push('⚠️저촉:'+nm);
    });
  }catch(e){}
  if(info.useZone&&!info.rawItems.includes(info.useZone)) info.rawItems.unshift(info.useZone);
  // 카테고리 분류
  const assigned=new Set();
  CAT.forEach(cat=>{
    const matched=info.rawItems.filter(item=>{
      const v=item.replace('⚠️저촉:','').toLowerCase();
      return cat.keys.some(k=>v.includes(k));
    });
    if(matched.length){
      info.categorized[cat.cat]={...cat,items:matched};
      matched.forEach(m=>assigned.add(m));
    }
  });
  const others=info.rawItems.filter(i=>!assigned.has(i)&&!assigned.has(i.replace('⚠️저촉:','')));
  if(others.length) info.categorized['기타']={items:others,warn:false,icon:'📌',color:'#5a7090',law:'개별법령'};
  return info;
}

// ── 렌더 ──
function renderResult(info,addr,pnu){
  show('result');
  const hasWarn=Object.values(info.categorized).some(c=>c.warn&&c.items.length);
  // 뱃지
  const badges=[];
  if(info.useZone) badges.push({t:info.useZone,cls:'badge-info'});
  Object.values(info.categorized).forEach(cat=>{
    if(cat.warn&&cat.items.length) cat.items.slice(0,1).forEach(it=>{
      badges.push({t:'⚠️ '+it.replace('⚠️저촉:',''),cls:'badge-warn'});
    });
  });
  if(!hasWarn) badges.push({t:'특수규제 없음',cls:'badge-ok'});

  // 섹션 HTML
  const priOrder=['지구단위계획','도시계획시설','개발행위 제한','개발제한구역','접도구역',
    '농업진흥구역','산지·임야 규제','군사시설보호구역','문화재 보호구역',
    '하천·수변구역','자연공원','환경보전 규제','재해위험 지구','항공·비행 제한',
    '토지거래허가구역','친환경·특구','경제자유구역·특구','기타'];
  let secHtml='';
  priOrder.forEach(name=>{
    const cat=info.categorized[name];
    if(!cat) return;
    const rows=cat.items.map(it=>{
      const isHit=it.startsWith('⚠️저촉:');
      return `<div class="sec-row">
        <span class="sec-row-label">${it.replace('⚠️저촉:','')}</span>
        <span class="sec-row-val ${isHit?'warn':''}">${isHit?'⚠️ 직접 저촉':'해당'}</span>
      </div>`;
    }).join('');
    const noteHtml=cat.note?`<div class="sec-note">${cat.note}</div>`:'';
    secHtml+=`
    <div class="sec fade-up">
      <div class="sec-hdr" onclick="toggleSec(this)">
        <div class="sec-title">
          <span class="sec-icon">${cat.icon}</span>
          <span>${name}</span>
          <span class="sec-badge ${cat.warn?'':'ok'}">${cat.warn?'규제':'참고'}</span>
        </div>
        <span class="sec-chevron">▼</span>
      </div>
      <div class="sec-body">
        <div class="sec-law">${cat.law||''}</div>
        ${rows}
        ${noteHtml}
      </div>
    </div>`;
  });

  // 건축기준 섹션
  const buildRows=[
    {n:'건폐율 한도',v:info.bcr?info.bcr+'%':'확인필요'},
    {n:'용적률 한도',v:info.far?info.far+'%':'확인필요'},
    {n:'정북 일조 이격',v:info.solar||'조례 확인'},
    {n:'건축선 이격',v:'도로경계로부터 1m 이상'},
    {n:'인접대지 이격',v:'경계선으로부터 0.5m 이상'},
  ].map(r=>`<div class="sec-row"><span class="sec-row-label">${r.n}</span><span class="sec-row-val">${r.v}</span></div>`).join('');

  const buildSec=`<div class="sec fade-up">
    <div class="sec-hdr" onclick="toggleSec(this)">
      <div class="sec-title"><span class="sec-icon">📐</span><span>건축기준</span><span class="sec-badge ok">기준</span></div>
      <span class="sec-chevron">▼</span>
    </div>
    <div class="sec-body"><div class="sec-law">건축법 · 국토계획법</div>${buildRows}${info.note?`<div class="sec-note">${info.note}</div>`:''}</div>
  </div>`;

  document.getElementById('result').innerHTML=`
    <div class="lot-header fade-up">
      <div class="lot-addr">${addr}</div>
      <div class="lot-pnu">PNU: ${pnu}</div>
    </div>
    <div class="ratio-grid fade-up">
      <div class="ratio-card bcr">
        <div class="ratio-label">건폐율 한도</div>
        <div class="ratio-val">${info.bcr||'-'}<span style="font-size:14px;color:var(--soft);">%</span></div>
        <div class="ratio-bar"><div class="ratio-fill" id="bcr-fill" style="width:0%"></div></div>
      </div>
      <div class="ratio-card far">
        <div class="ratio-label">용적률 한도</div>
        <div class="ratio-val">${info.far||'-'}<span style="font-size:14px;color:var(--soft);">%</span></div>
        <div class="ratio-bar"><div class="ratio-fill" id="far-fill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="badges fade-up">${badges.map(b=>`<span class="badge ${b.cls}">${b.t}</span>`).join('')}</div>
    ${buildSec}
    ${secHtml||'<div style="text-align:center;padding:20px;color:var(--soft);font-size:12px;">특수 규제 없음 — 용도지역 기준만 적용됩니다</div>'}
    <button class="luris-btn" onclick="window.open('https://www.eum.go.kr/web/ar/lu/luLandDtl.jsp?selSido=&pnu=${pnu}','_blank')">
      🔗 토지이음에서 공식 확인
    </button>
  `;
  // 게이지 애니메이션
  setTimeout(()=>{
    const bf=document.getElementById('bcr-fill');
    const ff=document.getElementById('far-fill');
    if(bf) bf.style.width=Math.min(info.bcr,100)+'%';
    if(ff) ff.style.width=Math.min((info.far/15),100)+'%';
  },100);
  // 첫 섹션 열기
  const firstSec=document.querySelector('.sec');
  if(firstSec) firstSec.classList.add('open');
}

function toggleSec(hdr){
  hdr.closest('.sec').classList.toggle('open');
}

// ── 유틸 ──
function show(state){
  ['empty','loading','result','err-box'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.display=id===state?'block':'none';
  });
  if(state==='result') document.getElementById('result').style.display='block';
}
function showErr(title,sub){
  show('err-box');
  document.getElementById('err-title').textContent=title;
  document.getElementById('err-sub').textContent=sub;
}
function esc(s){return s.replace(/'/g,"&#39;");}

function jsonp(url,cb){
  const fn='_jcb'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  window[fn]=(d)=>{try{delete window[fn];}catch(e){}cb(d);};
  const s=document.createElement('script');
  s.onerror=()=>{try{delete window[fn];}catch(e){}cb(null);};
  s.src=url+'&callback='+fn;
  document.head.appendChild(s);
  setTimeout(()=>{if(window[fn]){delete window[fn];cb(null);}},8000);
}

// 외부 클릭 시 자동완성 닫기
document.addEventListener('click',e=>{
  if(!e.target.closest('.search-bar')&&!e.target.closest('.suggest'))
    document.getElementById('suggest').classList.remove('show');
});
</script>
