<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>시공관리 · 관리도구</title>
<style>
:root{
  --bg:#07090f;--s1:#0d1117;--s2:#131925;
  --b1:#1e2a3e;--tx:#dde4f2;--soft:#6a7a9a;
  --green:#10b981;--blue:#3b82f6;--red:#ef4444;--orange:#f59e0b;--purple:#8b5cf6;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;padding:20px;min-height:100vh;}
h1{font-size:18px;font-weight:800;margin-bottom:4px}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:18px;margin-bottom:14px;}
.card-title{font-size:12px;font-weight:700;margin-bottom:12px;}
label{display:block;font-size:10px;color:var(--soft);font-weight:700;margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
input,select{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;color:var(--tx);font-size:13px;font-family:inherit;outline:none;margin-bottom:12px;}
input:focus{border-color:var(--blue);}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-blue{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;}
.btn-green{background:linear-gradient(135deg,#059669,#047857);color:#fff;}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;}
.btn-sm{width:auto;padding:6px 12px;font-size:11px;border-radius:7px;border:none;cursor:pointer;font-family:inherit;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn:active{opacity:.8;}
.status{border-radius:10px;padding:12px 14px;font-size:12px;margin-top:10px;display:none;line-height:1.6;white-space:pre-line;}
.s-ok{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);color:var(--green);}
.s-err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:var(--red);}
.s-ing{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);color:var(--blue);}
.file-drop{border:2px dashed var(--b1);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;position:relative;margin-bottom:12px;}
.file-drop:hover,.file-drop.drag{border-color:var(--blue);background:rgba(59,130,246,.05);}
.file-drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:inline-block;}
.tabs{display:flex;gap:4px;background:var(--s2);border-radius:10px;padding:4px;margin-bottom:16px;}
.tab-btn{flex:1;padding:9px;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--soft);background:transparent;}
.tab-btn.active{background:var(--s1);color:var(--tx);box-shadow:0 1px 4px rgba(0,0,0,.3);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.role-btns{display:flex;gap:6px;margin-bottom:12px;}
.role-btn{flex:1;padding:12px 8px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;border:1.5px solid var(--b1);background:var(--s2);color:var(--soft);text-align:center;line-height:1.6;}
.role-btn.sel-admin{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.4);color:var(--red);}
.role-btn.sel-viewer{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.4);color:var(--blue);}
.user-item{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;margin-bottom:6px;}
.user-role{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;white-space:nowrap;}
.role-admin{background:rgba(239,68,68,.15);color:var(--red);}
.role-viewer{background:rgba(59,130,246,.15);color:var(--blue);}
.user-del{padding:4px 10px;border:1px solid rgba(239,68,68,.25);border-radius:5px;background:rgba(239,68,68,.08);color:var(--red);font-size:10px;cursor:pointer;font-family:inherit;white-space:nowrap;}
</style>
</head>
<body>
<div style="max-width:500px;margin:0 auto;">

<div style="margin-bottom:20px;">
  <div style="font-size:10px;color:var(--blue);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;">더존하우징 · 시공관리</div>
  <h1>🛠 관리 도구</h1>
  <p style="font-size:12px;color:var(--soft);margin-top:4px;">앱 배포 · 사용자 관리 · 설정</p>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('upload')">📤 파일 배포</button>
  <button class="tab-btn" onclick="switchTab('user')">👤 사용자</button>
  <button class="tab-btn" onclick="switchTab('setting')">⚙️ 설정</button>
</div>

<!-- 파일 배포 탭 -->
<div id="tab-upload" class="tab-panel active">
  <div class="card">
    <div class="card-title">📤 앱 파일 업로드</div>
    <div class="file-drop" id="drop-area">
      <input type="file" id="file-input" accept=".html,.js,.css,.json" onchange="onFileSelect(this)">
      <div style="font-size:28px;margin-bottom:6px;">📄</div>
      <div id="drop-title" style="font-size:13px;font-weight:700;margin-bottom:3px;">파일 선택 또는 드래그</div>
      <div id="drop-sub" style="font-size:10px;color:var(--soft);">sicgong.html 등 업로드할 파일</div>
    </div>
    <div id="file-info" style="display:none;background:var(--s2);border-radius:8px;padding:10px 12px;margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;"><span style="color:var(--soft);">파일명</span><span id="fi-name" style="font-family:monospace;"></span></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;"><span style="color:var(--soft);">크기</span><span id="fi-size" style="font-family:monospace;"></span></div>
    </div>
    <label>커밋 메시지</label>
    <input type="text" id="commit-msg" value="시공관리 업데이트">
    <button class="btn btn-green" onclick="uploadFile()" id="btn-upload" disabled>🚀 GitHub에 업로드</button>
    <div class="status" id="upload-status"></div>
  </div>
  <div class="card">
    <div class="card-title">🔗 빠른 링크</div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <button class="btn" style="background:var(--s2);border:1px solid var(--b1);color:var(--tx);font-size:12px;" onclick="window.open('https://wisestar823.github.io/-/sicgong.html','_blank')">🌐 앱 열기</button>
      <button class="btn" style="background:var(--s2);border:1px solid var(--b1);color:var(--tx);font-size:12px;" onclick="window.open('https://github.com/wisestar823/-/actions','_blank')">⚙️ 배포 상태 확인</button>
    </div>
  </div>
</div>

<!-- 사용자 관리 탭 -->
<div id="tab-user" class="tab-panel">
  <div class="card">
    <div class="card-title" style="color:var(--purple);">➕ 새 사용자 추가</div>

    <div style="background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:11px;color:var(--soft);line-height:1.7;">
      📱 <strong style="color:var(--tx);">기기 ID 확인 방법</strong><br>
      앱 잠금화면 하단 <span style="color:#3b82f6;font-family:monospace;">기기 ID</span> 표시됨<br>
      [📋 ID 복사] 탭 → 아래에 붙여넣기
    </div>

    <label>사용자 ID (기기 ID)</label>
    <input type="text" id="new-user-id" placeholder="앱 잠금화면의 기기 ID 붙여넣기">

    <label>역할 선택</label>
    <div class="role-btns">
      <button class="role-btn" id="btn-admin" onclick="selectRole('admin')">
        🔴 관리자<br><span style="font-size:9px;font-weight:400;">모든 기능</span>
      </button>
      <button class="role-btn" id="btn-viewer" onclick="selectRole('viewer')">
        🔵 뷰어<br><span style="font-size:9px;font-weight:400;">조회만 가능</span>
      </button>
    </div>

    <label>메모 (선택)</label>
    <input type="text" id="new-user-memo" placeholder="예) 김동완 차장, 현장 태블릿">

    <button class="btn btn-purple" onclick="addUser()" id="btn-add-user">✅ 추가 후 GitHub에 반영</button>
    <div class="status" id="user-add-status"></div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div class="card-title" style="margin-bottom:0;">👥 등록된 사용자</div>
      <button class="btn-sm btn-blue" onclick="loadAllowlist()" style="color:#fff;">🔄 새로고침</button>
    </div>
    <div id="user-list">
      <div style="text-align:center;padding:16px;color:var(--soft);font-size:12px;">설정 탭에서 Token 입력 후 새로고침</div>
    </div>
    <div class="status" id="user-list-status"></div>
  </div>
</div>

<!-- 설정 탭 -->
<div id="tab-setting" class="tab-panel">
  <div class="card">
    <div class="card-title">⚙️ GitHub 연결 설정</div>
    <label>GitHub Token</label>
    <input type="password" id="token" placeholder="ghp_..." oninput="saveSettings()">
    <label>저장소 (owner/repo)</label>
    <input type="text" id="repo" value="wisestar823/-" oninput="saveSettings()">
    <label>브랜치</label>
    <input type="text" id="branch" value="main" oninput="saveSettings()">
    <label>앱 파일 경로</label>
    <input type="text" id="filepath" value="sicgong.html" oninput="saveSettings()">
    <label>사용자 목록 파일 경로</label>
    <input type="text" id="allowlist-path" value="allowlist.json" oninput="saveSettings()">
    <button class="btn btn-blue" onclick="testConnection()" id="btn-test">🔗 연결 테스트</button>
    <div class="status" id="test-status"></div>
  </div>
</div>

</div>
<script>
// ── 탭 전환 ──
function switchTab(t){
  ['upload','user','setting'].forEach((id,i)=>{
    document.querySelectorAll('.tab-btn')[i].classList.toggle('active',id===t);
    document.getElementById('tab-'+id).classList.toggle('active',id===t);
  });
  if(t==='user') loadAllowlist();
}

// ── 설정 ──
function saveSettings(){
  localStorage.setItem('gh_mgr_v2',JSON.stringify({
    token:document.getElementById('token').value,
    repo:document.getElementById('repo').value,
    branch:document.getElementById('branch').value,
    filepath:document.getElementById('filepath').value,
    allowlistPath:document.getElementById('allowlist-path').value,
  }));
}
function loadSettings(){
  try{
    const s=JSON.parse(localStorage.getItem('gh_mgr_v2')||localStorage.getItem('gh_mgr_settings')||'{}');
    if(s.token) document.getElementById('token').value=s.token;
    if(s.repo)  document.getElementById('repo').value=s.repo;
    if(s.branch)document.getElementById('branch').value=s.branch;
    if(s.filepath)document.getElementById('filepath').value=s.filepath;
    if(s.allowlistPath)document.getElementById('allowlist-path').value=s.allowlistPath;
  }catch(e){}
}
function cfg(){
  return{
    token:document.getElementById('token').value.trim(),
    repo:document.getElementById('repo').value.trim(),
    branch:document.getElementById('branch').value.trim(),
    filepath:document.getElementById('filepath').value.trim(),
    alPath:document.getElementById('allowlist-path').value.trim()||'allowlist.json',
  };
}

// ── GitHub API ──
function ghHdr(token){
  return{
    'Authorization':'token '+token,
    'Accept':'application/vnd.github.v3+json',
    'Content-Type':'application/json'
  };
}

// Base64 인코딩/디코딩 (한글 포함 안전)
function safeB64Encode(str){
  const bytes=new TextEncoder().encode(str);
  let binary='';
  bytes.forEach(b=>binary+=String.fromCharCode(b));
  return btoa(binary);
}
function safeB64Decode(b64){
  const binary=atob(b64.replace(/\n/g,''));
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

async function ghGet(token,repo,path,branch){
  const[owner,name]=repo.split('/');
  const url=`https://api.github.com/repos/${owner}/${name}/contents/${encodeURIComponent(path)}?ref=${encodeURIComponent(branch)}`;
  const r=await fetch(url,{headers:ghHdr(token)});
  if(r.status===404) return null; // 파일 없음
  if(!r.ok){const e=await r.json();throw new Error(e.message||'GitHub API 오류');}
  const d=await r.json();
  return{sha:d.sha, content:safeB64Decode(d.content)};
}

async function ghPut(token,repo,path,branch,content,sha,msg){
  const[owner,name]=repo.split('/');
  const b64=safeB64Encode(content);
  const body={
    message:msg+' ('+new Date().toLocaleString('ko-KR')+')',
    content:b64,
    branch:branch,
  };
  if(sha) body.sha=sha;
  const r=await fetch(
    `https://api.github.com/repos/${owner}/${name}/contents/${encodeURIComponent(path)}`,
    {method:'PUT',headers:ghHdr(token),body:JSON.stringify(body)}
  );
  if(!r.ok){const e=await r.json();throw new Error(e.message||'업로드 실패');}
  return r;
}

// ── 연결 테스트 ──
async function testConnection(){
  const{token,repo,branch}=cfg();
  const st=document.getElementById('test-status');
  const btn=document.getElementById('btn-test');
  if(!token){showStatus(st,'❌ Token을 입력하세요','err');return;}
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> 확인 중...';showStatus(st,'확인 중...','ing');
  try{
    const[owner,name]=repo.split('/');
    const r=await fetch(`https://api.github.com/repos/${owner}/${name}/branches/${branch}`,{headers:ghHdr(token)});
    if(r.ok){
      const d=await r.json();
      showStatus(st,`✅ 연결 성공!\n저장소: ${repo}\n브랜치: ${branch}\n커밋: ${d.commit.sha.slice(0,7)}`,'ok');
    }else{const e=await r.json();showStatus(st,'❌ 실패: '+e.message,'err');}
  }catch(e){showStatus(st,'❌ '+e.message,'err');}
  finally{btn.disabled=false;btn.innerHTML='🔗 연결 테스트';}
}

// ── 파일 선택 ──
let selFile=null,selContent=null;
function onFileSelect(input){
  const file=input.files[0];if(!file)return;
  selFile=file;
  document.getElementById('fi-name').textContent=file.name;
  document.getElementById('fi-size').textContent=(file.size/1024).toFixed(1)+'KB';
  document.getElementById('file-info').style.display='block';
  document.getElementById('drop-title').textContent=file.name;
  document.getElementById('drop-sub').textContent=(file.size/1024).toFixed(1)+'KB';
  document.getElementById('btn-upload').disabled=false;
  const r=new FileReader();
  r.onload=e=>{selContent=e.target.result;};
  r.readAsText(file,'utf-8');
}

// ── 파일 업로드 ──
async function uploadFile(){
  if(!selFile||!selContent){alert('파일을 먼저 선택하세요');return;}
  const{token,repo,branch,filepath}=cfg();
  const msg=document.getElementById('commit-msg').value.trim()||'시공관리 업데이트';
  const st=document.getElementById('upload-status');
  const btn=document.getElementById('btn-upload');
  if(!token){showStatus(st,'❌ 설정 탭에서 Token을 입력하세요','err');return;}
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> 업로드 중...';showStatus(st,'업로드 중...','ing');
  try{
    const cur=await ghGet(token,repo,filepath,branch);
    await ghPut(token,repo,filepath,branch,selContent,cur?.sha,msg);
    showStatus(st,'✅ 업로드 완료!\n약 1분 후 사이트에 반영됩니다','ok');
  }catch(e){showStatus(st,'❌ '+e.message,'err');}
  finally{btn.disabled=false;btn.innerHTML='🚀 GitHub에 업로드';}
}

// ── 역할 선택 ──
let selRole='';
function selectRole(r){
  selRole=r;
  document.getElementById('btn-admin').className='role-btn'+(r==='admin'?' sel-admin':'');
  document.getElementById('btn-viewer').className='role-btn'+(r==='viewer'?' sel-viewer':'');
}

// ── allowlist.json 불러오기 ──
async function loadAllowlist(){
  const{token,repo,branch,alPath}=cfg();
  const el=document.getElementById('user-list');
  const st=document.getElementById('user-list-status');
  if(!token){
    el.innerHTML='<div style="text-align:center;padding:12px;color:var(--soft);font-size:12px;">⚙️ 설정 탭에서 Token을 입력하세요</div>';
    return;
  }
  el.innerHTML='<div style="text-align:center;padding:12px;color:var(--soft);font-size:12px;">🔄 불러오는 중...</div>';
  st.style.display='none';
  try{
    const file=await ghGet(token,repo,alPath,branch);
    if(!file){
      el.innerHTML='<div style="text-align:center;padding:12px;color:var(--soft);font-size:12px;">등록된 사용자 없음<br>첫 사용자 추가 시 자동 생성됩니다</div>';
      return;
    }
    const raw=JSON.parse(file.content);
    // 배열 또는 {users:[]} 형식 모두 지원
    const users=Array.isArray(raw)?raw:(raw.users||[]);
    if(!users.length){
      el.innerHTML='<div style="text-align:center;padding:12px;color:var(--soft);font-size:12px;">등록된 사용자가 없습니다</div>';
      return;
    }
    el.innerHTML=users.map((u,i)=>`
      <div class="user-item">
        <div style="flex:1;min-width:0;">
          <div style="font-size:12px;font-weight:700;font-family:monospace;">${u.id}</div>
          ${u.memo?`<div style="font-size:10px;color:var(--soft);margin-top:1px;">${u.memo}</div>`:''}
          <div style="font-size:9px;color:var(--soft);margin-top:1px;">${u.addedAt||''}</div>
        </div>
        <span class="user-role ${u.role==='admin'?'role-admin':'role-viewer'}">${u.role==='admin'?'🔴 관리자':'🔵 뷰어'}</span>
        <button class="user-del" onclick="deleteUser(${i})">삭제</button>
      </div>`).join('');
  }catch(e){
    el.innerHTML=`<div style="color:var(--red);font-size:12px;padding:8px;">❌ 오류: ${e.message}</div>`;
  }
}

// ── 사용자 추가 ──
async function addUser(){
  const{token,repo,branch,alPath}=cfg();
  const userId=document.getElementById('new-user-id').value.trim();
  const memo=document.getElementById('new-user-memo').value.trim();
  const st=document.getElementById('user-add-status');
  const btn=document.getElementById('btn-add-user');

  if(!token){showStatus(st,'❌ 설정 탭에서 Token을 입력하세요','err');return;}
  if(!userId){showStatus(st,'❌ 사용자 ID를 입력하세요','err');return;}
  if(!selRole){showStatus(st,'❌ 역할을 선택하세요 (관리자/뷰어)','err');return;}

  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> 처리 중...';
  showStatus(st,'allowlist.json 확인 중...','ing');

  try{
    // 기존 파일 조회
    const file=await ghGet(token,repo,alPath,branch);
    let users=[];
    let sha=null;

    if(file){
      sha=file.sha;
      const raw=JSON.parse(file.content);
      users=Array.isArray(raw)?raw:(raw.users||[]);
    }

    // 중복 체크
    if(users.find(u=>u.id===userId)){
      showStatus(st,'⚠️ 이미 등록된 ID입니다','err');
      return;
    }

    // 신규 사용자 추가
    users.push({
      id:userId,
      role:selRole,
      memo:memo||'',
      addedAt:new Date().toISOString().slice(0,10)
    });

    // allowlist.json은 배열 형식으로 저장 (앱 호환)
    const newContent=JSON.stringify(users,null,2);

    showStatus(st,'GitHub에 저장 중...','ing');
    await ghPut(token,repo,alPath,branch,newContent,sha,`사용자 추가: ${userId} (${selRole})`);

    showStatus(st,
      `✅ ${userId} (${selRole==='admin'?'관리자':'뷰어'}) 등록 완료!\n약 1분 후 앱에서 사용 가능합니다`,
      'ok'
    );
    document.getElementById('new-user-id').value='';
    document.getElementById('new-user-memo').value='';
    selectRole('');
    loadAllowlist();

  }catch(e){
    showStatus(st,'❌ '+e.message,'err');
  }finally{
    btn.disabled=false;
    btn.innerHTML='✅ 추가 후 GitHub에 반영';
  }
}

// ── 사용자 삭제 ──
async function deleteUser(idx){
  const{token,repo,branch,alPath}=cfg();
  const st=document.getElementById('user-list-status');
  if(!confirm('이 사용자를 삭제하시겠습니까?')) return;
  showStatus(st,'⏳ 삭제 중...','ing');
  try{
    const file=await ghGet(token,repo,alPath,branch);
    if(!file){showStatus(st,'❌ 파일을 찾을 수 없습니다','err');return;}
    const raw=JSON.parse(file.content);
    const users=Array.isArray(raw)?raw:(raw.users||[]);
    const removed=users[idx];
    users.splice(idx,1);
    await ghPut(token,repo,alPath,branch,JSON.stringify(users,null,2),file.sha,`사용자 삭제: ${removed?.id}`);
    showStatus(st,'✅ 삭제 완료','ok');
    loadAllowlist();
  }catch(e){showStatus(st,'❌ '+e.message,'err');}
}

function showStatus(el,msg,type){
  el.style.display='block';
  el.className='status s-'+type;
  el.textContent=msg;
}

// 드래그 앤 드롭
const drop=document.getElementById('drop-area');
drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('drag');});
drop.addEventListener('dragleave',()=>drop.classList.remove('drag'));
drop.addEventListener('drop',e=>{
  e.preventDefault();drop.classList.remove('drag');
  const file=e.dataTransfer.files[0];
  if(file){
    const dt=new DataTransfer();dt.items.add(file);
    document.getElementById('file-input').files=dt.files;
    onFileSelect(document.getElementById('file-input'));
  }
});

loadSettings();
